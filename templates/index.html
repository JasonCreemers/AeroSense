<!DOCTYPE html>
<html>
<head>
    <title>AeroSense GUI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #222; color: #eee; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .section { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        h2 { border-bottom: 1px solid #555; padding-bottom: 10px; }
        
        /* Camera */
        img { width: 100%; border-radius: 5px; border: 2px solid #555; }
        .time-tag { color: #aaa; font-size: 0.9em; margin-bottom: 10px; display: block; }
        
        /* Buttons */
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #28a745; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-gray { background: #6c757d; color: white; }
        
        /* Cycles Grid */
        .cycle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cycle-btn { padding: 15px; background: #444; color: #888; }
        .cycle-btn.active { background: #28a745; color: white; box-shadow: 0 0 10px #28a745; }

        /* Diagnostics */
        pre { background: #111; padding: 10px; text-align: left; overflow-x: auto; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AeroSense Controller</h1>

        <div class="section">
            <h2>Live View</h2>
            {% if latest_image %}
                <img src="/images/{{ latest_image }}" alt="Recent Capture">
                <span class="time-tag">Taken: {{ img_time }}</span>
            {% else %}
                <p>No Images Available</p>
            {% endif %}
            <br>
            <button onclick="apiCall('/api/capture', 'POST')" class="btn-blue">📸 Capture Sequence</button>
            <button onclick="apiCall('/api/live', 'POST')" class="btn-green">👁 Indefinite Live Feed</button>
        </div>

        <div class="section">
            <h2>Automation Cycles</h2>
            <div class="cycle-grid" id="cycleContainer">
                </div>
            <br>
            <button onclick="toggleCycle('ALL_ON')" class="btn-green">ALL ON</button>
            <button onclick="toggleCycle('ALL_OFF')" class="btn-red">ALL OFF</button>
        </div>

        <div class="section">
            <h2>Diagnostics</h2>
            <pre>{{ status_text }}</pre>
            <span class="time-tag">Refreshed on Page Load</span>
            <br>
            <button onclick="window.location.reload()" class="btn-gray">STATUS (Refresh)</button>
            <button onclick="apiCall('/api/action', 'POST', {action: 'RESET'})" class="btn-blue">RESET</button>
            <button onclick="apiCall('/api/action', 'POST', {action: 'SYNC'})" class="btn-green">SYNC</button>
        </div>
    </div>

    <script>
        // Load cycle states on boot
        fetch('/api/cycles')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('cycleContainer');
                for (const [key, val] of Object.entries(data)) {
                    const btn = document.createElement('button');
                    btn.className = `cycle-btn ${val ? 'active' : ''}`;
                    btn.innerText = key.toUpperCase();
                    btn.onclick = () => toggleCycle(key);
                    container.appendChild(btn);
                }
            });

        function toggleCycle(target) {
            fetch('/api/toggle_cycle', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target: target})
            }).then(() => window.location.reload());
        }

        function apiCall(url, method, body={}) {
            fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            }).then(() => window.location.reload());
        }
    </script>
</body>
</html>
